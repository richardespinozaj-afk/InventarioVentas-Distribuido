worker_processes auto;
events { worker_connections 1024; }

http {
    upstream inventory_cluster {
        server inventory1:8080 max_fails=2 fail_timeout=10s;
        server inventory2:8080 max_fails=2 fail_timeout=10s;
    }

    upstream reporting_cluster {
        server reporting:8080 max_fails=2 fail_timeout=10s;
    }

    server {
        listen 80;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_connect_timeout 3s;
        proxy_read_timeout 8s;

        location /api/reportes {
            proxy_pass http://reporting_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://inventory_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
