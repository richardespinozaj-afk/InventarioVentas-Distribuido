<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario y Ventas</title>
<style>
 body{font-family:system-ui,Arial,sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
 header{background:#1e293b;padding:16px 24px;border-bottom:2px solid #38bdf8}
 h1{margin:0;font-size:20px}.sub{color:#94a3b8;font-size:13px}
 main{padding:24px;max-width:1050px;margin:auto}
 h3{margin:0 0 12px}
 .card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;margin-bottom:20px}
 table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:8px;border-bottom:1px solid #334155}
 th{color:#94a3b8;font-size:13px;text-transform:uppercase;letter-spacing:.03em}
 input,select{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:7px;border-radius:6px;margin:2px}
 button{background:#38bdf8;border:0;color:#0f172a;font-weight:600;padding:8px 14px;border-radius:6px;cursor:pointer;margin:2px}
 button.d{background:#f87171}button.e{background:#fbbf24}button.g{background:#34d399}
 .node{float:right;font-size:12px;color:#38bdf8}
 .row2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
 .msg{font-size:13px;margin-left:8px}.ok{color:#34d399}.err{color:#f87171}
 .crit{color:#fbbf24;font-weight:600}
 @media(max-width:800px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
 <h1>🛒 Inventario y Ventas <span class="node" id="node">nodo: ?</span></h1>
 <div class="sub">Servicio principal · API REST · Sistemas Distribuidos UTP</div>
</header>
<main>

 <div class="card">
  <h3 id="formTitle">Nuevo producto</h3>
  <input id="codigo" placeholder="Código">
  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio" type="number" step="0.01">
  <input id="stock" placeholder="Stock" type="number">
  <button id="btnGuardar" onclick="guardarProducto()">Agregar</button>
  <button class="d" id="btnCancelar" onclick="cancelarEdicion()" style="display:none">Cancelar</button>
  <span id="msgProd" class="msg"></span>
 </div>

 <div class="card">
  <h3>Inventario</h3>
  <table>
   <thead><tr><th>ID</th><th>Código</th><th>Nombre</th><th>Precio</th><th>Stock</th><th></th></tr></thead>
   <tbody id="tbodyProd"></tbody>
  </table>
 </div>

 <div class="card">
  <h3>Registrar venta</h3>
  <input id="ventaCliente" placeholder="Cliente">
  <select id="ventaProducto"></select>
  <input id="ventaCantidad" placeholder="Cantidad" type="number" min="1" value="1" style="width:90px">
  <button class="g" onclick="registrarVenta()">Registrar venta</button>
  <span id="msgVenta" class="msg"></span>
 </div>

 <div class="row2">
  <div class="card">
   <h3>Historial de ventas</h3>
   <table>
    <thead><tr><th>ID</th><th>Cliente</th><th>Fecha</th><th>Total</th></tr></thead>
    <tbody id="tbodyVentas"></tbody>
   </table>
  </div>
  <div class="card">
   <h3>Reportes</h3>
   <div>
    Umbral stock: <input id="umbral" type="number" value="10" style="width:70px">
    <button onclick="cargarReportes()">Actualizar</button>
   </div>
   <p><b>Productos con stock bajo:</b></p>
   <ul id="stockBajo"></ul>
   <p id="resumenVentas"><b>Resumen de ventas:</b> —</p>
  </div>
 </div>

</main>
<script>
const API = '/api';
let editando = null;

async function health(){
  try{ const j = await (await fetch(API+'/health')).json();
    document.getElementById('node').textContent = 'nodo: ' + j.node;
  }catch(e){}
}

async function cargarProductos(){
  const data = await (await fetch(API+'/productos')).json();
  document.getElementById('tbodyProd').innerHTML = data.map(p =>
    `<tr><td>${p.id}</td><td>${p.codigo}</td><td>${p.nombre}</td><td>S/ ${p.precio}</td>
     <td>${p.stock}</td>
     <td><button class="e" onclick='editar(${JSON.stringify(p)})'>Editar</button>
         <button class="d" onclick="eliminar(${p.id})">Eliminar</button></td></tr>`).join('');
  const sel = document.getElementById('ventaProducto');
  sel.innerHTML = data.map(p => `<option value="${p.id}">${p.nombre} (stock ${p.stock})</option>`).join('');
}

function editar(p){
  editando = p.id;
  codigo.value = p.codigo; nombre.value = p.nombre; precio.value = p.precio; stock.value = p.stock;
  formTitle.textContent = 'Editar producto #' + p.id;
  btnGuardar.textContent = 'Guardar cambios';
  btnCancelar.style.display = 'inline-block';
}

function cancelarEdicion(){
  editando = null;
  codigo.value = nombre.value = precio.value = stock.value = '';
  formTitle.textContent = 'Nuevo producto';
  btnGuardar.textContent = 'Agregar';
  btnCancelar.style.display = 'none';
  document.getElementById('msgProd').textContent = '';
}

async function guardarProducto(){
  const body = {codigo:codigo.value, nombre:nombre.value, precio:parseFloat(precio.value), stock:parseInt(stock.value)};
  const url = editando ? API+'/productos/'+editando : API+'/productos';
  const method = editando ? 'PUT' : 'POST';
  const r = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const msg = document.getElementById('msgProd');
  if(r.ok){ msg.className='msg ok'; msg.textContent = editando ? 'Producto actualizado' : 'Producto agregado';
    cancelarEdicion(); cargarProductos(); }
  else { msg.className='msg err'; msg.textContent = 'Error al guardar'; }
}

async function eliminar(id){
  await fetch(API+'/productos/'+id, {method:'DELETE'});
  cargarProductos();
}

async function registrarVenta(){
  const body = { cliente: ventaCliente.value || 'Cliente', items: [
    { productoId: parseInt(ventaProducto.value), cantidad: parseInt(ventaCantidad.value) } ] };
  const r = await fetch(API+'/ventas', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const msg = document.getElementById('msgVenta');
  if(r.ok){ const v = await r.json(); msg.className='msg ok'; msg.textContent = 'Venta registrada. Total: S/ '+v.total;
    ventaCliente.value=''; cargarProductos(); cargarVentas(); }
  else { const e = await r.json().catch(()=>({error:'Error'})); msg.className='msg err'; msg.textContent = e.error; }
}

async function cargarVentas(){
  const data = await (await fetch(API+'/ventas')).json();
  document.getElementById('tbodyVentas').innerHTML = data.map(v =>
    `<tr><td>${v.id}</td><td>${v.cliente}</td><td>${(v.fecha||'').replace('T',' ').substring(0,19)}</td><td>S/ ${v.total}</td></tr>`).join('')
    || '<tr><td colspan="4" style="color:#94a3b8">Sin ventas aún</td></tr>';
}

async function cargarReportes(){
  const u = document.getElementById('umbral').value || 10;
  const bajo = await (await fetch(API+'/reportes/stock-bajo?umbral='+u)).json();
  document.getElementById('stockBajo').innerHTML = (bajo.productos||[]).map(p =>
    `<li class="crit">${p.nombre} — stock ${p.stock}</li>`).join('') || '<li>Ninguno bajo el umbral</li>';
  const res = await (await fetch(API+'/reportes/resumen-ventas')).json();
  document.getElementById('resumenVentas').innerHTML =
    `<b>Resumen de ventas:</b> ${res.cantidadVentas} ventas · Total S/ ${res.montoTotal}`;
}

function init(){ health(); cargarProductos(); cargarVentas(); cargarReportes(); setInterval(health, 4000); }
init();
</script>
</body>
</html>
