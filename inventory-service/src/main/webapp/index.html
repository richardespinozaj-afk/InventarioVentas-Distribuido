<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario y Ventas - Servicio Principal</title>
<style>
 body{font-family:system-ui,Arial,sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
 header{background:#1e293b;padding:16px 24px;border-bottom:2px solid #38bdf8}
 h1{margin:0;font-size:20px}.sub{color:#94a3b8;font-size:13px}
 main{padding:24px;max-width:1000px;margin:auto}
 .card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;margin-bottom:20px}
 table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:8px;border-bottom:1px solid #334155}
 input{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:6px;border-radius:6px}
 button{background:#38bdf8;border:0;color:#0f172a;font-weight:600;padding:8px 14px;border-radius:6px;cursor:pointer}
 button.d{background:#f87171}.node{float:right;font-size:12px;color:#38bdf8}
</style>
</head>
<body>
<header><h1>🛒 Inventario y Ventas <span class="node" id="node">nodo: ?</span></h1>
<div class="sub">Servicio principal · API REST · Sistemas Distribuidos UTP</div></header>
<main>
 <div class="card"><h3>Nuevo producto</h3>
  <input id="codigo" placeholder="Código">
  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio" type="number" step="0.01">
  <input id="stock" placeholder="Stock" type="number">
  <button onclick="crear()">Agregar</button>
 </div>
 <div class="card"><h3>Inventario</h3>
  <table><thead><tr><th>ID</th><th>Código</th><th>Nombre</th><th>Precio</th><th>Stock</th><th></th></tr></thead>
  <tbody id="tbody"></tbody></table>
 </div>
</main>
<script>
const API='/api';
async function health(){try{const r=await fetch(API+'/health');const j=await r.json();document.getElementById('node').textContent='nodo: '+j.node;}catch(e){}}
async function cargar(){const r=await fetch(API+'/productos');const data=await r.json();
 document.getElementById('tbody').innerHTML=data.map(p=>`<tr><td>${p.id}</td><td>${p.codigo}</td><td>${p.nombre}</td><td>S/ ${p.precio}</td><td>${p.stock}</td><td><button class="d" onclick="eliminar(${p.id})">Eliminar</button></td></tr>`).join('');}
async function crear(){const p={codigo:codigo.value,nombre:nombre.value,precio:parseFloat(precio.value),stock:parseInt(stock.value)};
 await fetch(API+'/productos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
 codigo.value=nombre.value=precio.value=stock.value='';cargar();}
async function eliminar(id){await fetch(API+'/productos/'+id,{method:'DELETE'});cargar();}
health();cargar();setInterval(health,4000);
</script>
</body></html>
